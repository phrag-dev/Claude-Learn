name: Rebuild Dashboard

on:
  push:
    branches: [master]
    paths:
      - 'Notes/LEARNING_TRACKER.md'
      - 'Notes/topics/**'
      - 'bug/BUG_REGISTER.md'
      - 'docs/data/skills.json'
      - 'docs/data/audits.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r dashboard/requirements.txt

      - name: Build dashboard
        working-directory: dashboard
        run: python build.py

      - name: Commit rebuilt docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to docs/ — skipping commit"
          else
            git commit -m "ci: rebuild dashboard [skip ci]"
            git push
          fi
